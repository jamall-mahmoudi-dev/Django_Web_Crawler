{% csrf_token %}
<!doctype html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
          integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Django Web Crawler</title>
</head>

<!-- فقط رنگ body رو عوض کردم -->
<body class="bg-info">

<!-- نوار ناوبری: از bg-dark به bg-primary تغییر کرد -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <a class="navbar-brand" href="https://docs.djangoproject.com/en/3.1/topics/email/">Django Class Mahmmoudi </a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav mr-auto">
        </ul>
        <form class="form-inline my-2 my-lg-0">
            <a href="https://github.com/jamall-mahmoudi-dev/" add target="_blank">
                <i class="fa fa-github" style="font-size:41px;color:white; margin-left:7px"></i></a>
        </form>
    </div>
</nav>


<div class="jumbotron bg-white">
    <h1 class="display-4 text-primary">Crawl a Web Page!</h1>
    <p class="lead text-secondary">برنامه پایتون برای خزیدن در یک صفحه وب و یافتن پرتکرارترین کلمه‌ها! برای کلاس جنگو 
</p>
    <hr class="my-4">
    <p class="text-muted">The task is to count the most frequent words, which extracts data from dynamic sources.</p>
    <form method="POST" action="/">
        {% csrf_token %}
        {{ form.url }}
        <input class="btn btn-success" type="submit" name="Send">
    </form>
</div>


<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx"
        crossorigin="anonymous"></script>

</body>
</html>
